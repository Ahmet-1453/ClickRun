<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click&Run | Koşum Geçmişi</title>
    <link rel="stylesheet" href="/Css/aft.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <style>
        /* ── Filtre tab ──────────────────────────────── */
        .ftab {
            padding: 5px 13px;
            border: none; background: transparent;
            font-size: 13px; font-weight: 500;
            color: var(--text-2); cursor: pointer;
            border-radius: calc(var(--radius) - 3px);
            transition: all var(--transition);
            font-family: inherit;
            white-space: nowrap;
        }
        .ftab.active {
            background: var(--surface);
            color: var(--text-1);
            box-shadow: var(--shadow-sm);
        }
        .ftab:hover:not(.active) { color: var(--text-1); }

        /* ── Durum badge ─────────────────────────────── */
        .run-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 99px;
            font-size: 12px; font-weight: 600; white-space: nowrap;
        }
        .run-badge-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: currentColor; flex-shrink: 0;
        }
        .run-badge.success { background: var(--success-bg); color: var(--success); }
        .run-badge.fail    { background: var(--danger-bg);  color: var(--danger);  }
        .run-badge.running { background: #FFFBEB; color: #D97706; animation: pulse-b 1.5s infinite; }
        .run-badge.skipped { background: var(--surface-2);  color: var(--text-3);  }

        @keyframes pulse-b {
            0%,100% { opacity:1; } 50% { opacity:0.55; }
        }

        /* ── Adım ilerleme ───────────────────────────── */
        .steps-prog {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 13px; font-weight: 600;
        }
        .steps-prog .s-done  { color: var(--text-1); }
        .steps-prog .s-total { color: var(--text-3); }
        .steps-prog .s-warn  { color: var(--warning); font-size: 12px; }

        /* ── Tetikleyen ──────────────────────────────── */
        .trig-cell {
            display: inline-flex; align-items: center;
            gap: 5px; font-size: 12.5px; color: var(--text-2);
        }

        /* ── Kullanıcı hücresi ───────────────────────── */
        .user-cell {
            display: flex; align-items: center; gap: 8px;
        }
        .user-av {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; color: white; flex-shrink: 0;
        }
        .user-nm {
            font-size: 13px; font-weight: 500; color: var(--text-1);
        }

        /* ── Zaman hücresi ───────────────────────────── */
        .time-rel { font-size: 13px; font-weight: 500; color: var(--text-1); }
        .time-abs { font-size: 11px; color: var(--text-3); margin-top: 2px; }

        /* ── Chevron butonu ──────────────────────────── */
        .chev-btn {
            background: none; border: none; cursor: pointer;
            color: var(--text-3); padding: 4px;
            border-radius: var(--radius-sm);
            display: flex; align-items: center;
            transition: all var(--transition);
        }
        .chev-btn:hover { background: var(--surface-2); color: var(--text-1); }

        /* ── Drawer meta tablo ───────────────────────── */
        .dw-meta-tbl { width:100%; border-collapse:collapse; font-size:13px; }
        .dw-meta-tbl tr td { padding:10px 16px; border-bottom:1px solid var(--border); }
        .dw-meta-tbl tr:last-child td { border-bottom:none; }
        .dw-meta-tbl td:first-child {
            color:var(--text-3); font-size:12px; font-weight:500;
            width:100px; white-space:nowrap;
        }
        .dw-meta-tbl td:last-child {
            color:var(--text-1); font-weight:600; text-align:right;
        }

        /* ── Drawer adım listesi ─────────────────────── */
        .dw-step-row {
            display:flex; align-items:center; gap:10px;
            padding:8px 12px;
            border-radius:var(--radius-sm);
            background:var(--surface);
            border:1px solid var(--border);
            border-left-width:3px;
            font-size:13px; margin-bottom:4px;
        }
        .dw-step-row.ok   { border-left-color:var(--success); }
        .dw-step-row.fail { border-left-color:var(--danger); background:var(--danger-bg); }
        .dw-step-row.skip { border-left-color:var(--border-hover); opacity:0.6; }
        .dw-step-num  { font-size:11px; font-weight:700; color:var(--text-3); width:18px; text-align:center; flex-shrink:0; }
        .dw-step-name { flex:1; font-weight:500; color:var(--text-1); }
        .dw-step-dur  { font-family:monospace; font-size:12px; color:var(--text-3); flex-shrink:0; }
        .dw-step-icon { font-size:13px; flex-shrink:0; width:18px; text-align:center; }

        /* ── Drawer bölüm başlığı ────────────────────── */
        .dw-lbl {
            font-size:11px; font-weight:700; text-transform:uppercase;
            letter-spacing:0.6px; color:var(--text-3); margin-bottom:8px;
            display:flex; align-items:center; gap:6px;
        }
    </style>
</head>
<body>

<div id="sidebar-container"></div>
<div id="navbar-container"></div>

<div class="aft-main">
    <div class="page-content">

        <!-- BAŞLIK -->
        <div class="flex-between mb-24 animate-up">
            <div>
                <h1 style="font-size:22px;font-weight:700;color:var(--text-1);">Koşum Geçmişi</h1>
                <p style="font-size:13px;color:var(--text-3);margin-top:3px;">
                    Tetiklenen tüm test koşumlarınız · satıra tıklayarak detayı görüntüleyin
                </p>
            </div>
            <div class="flex gap-8">
                <button class="btn btn-secondary btn-sm" id="btn-export">
                    <svg width="13" height="13" fill="none" stroke="currentColor"
                         stroke-width="2" viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Rapor İndir
                </button>
                <button class="btn btn-ghost btn-sm" id="btn-refresh">
                    <svg width="13" height="13" fill="none" stroke="currentColor"
                         stroke-width="2" viewBox="0 0 24 24">
                        <polyline points="23 4 23 10 17 10"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                    Yenile
                </button>
            </div>
        </div>

        <!-- STAT KARTLARI -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);
      gap:16px;margin-bottom:24px;"
             class="animate-up stagger-1" id="stat-grid">

            <div class="stat-summary-card" id="sk-s1">
                <div class="skeleton" style="height:12px;width:55%;margin-bottom:14px;"></div>
                <div class="skeleton" style="height:32px;width:30%;"></div>
            </div>
            <div class="stat-summary-card" id="sk-s2">
                <div class="skeleton" style="height:12px;width:55%;margin-bottom:14px;"></div>
                <div class="skeleton" style="height:32px;width:30%;"></div>
            </div>
            <div class="stat-summary-card" id="sk-s3">
                <div class="skeleton" style="height:12px;width:55%;margin-bottom:14px;"></div>
                <div class="skeleton" style="height:32px;width:30%;"></div>
            </div>
            <div class="stat-summary-card" id="sk-s4">
                <div class="skeleton" style="height:12px;width:55%;margin-bottom:14px;"></div>
                <div class="skeleton" style="height:32px;width:30%;"></div>
            </div>

            <template id="tpl-stat">
                <div class="stat-summary-card" data-slot="card">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
                        <div data-slot="icon-wrap"
                             style="width:44px;height:44px;border-radius:10px;
              display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                            <svg data-slot="icon-svg" width="20" height="20"
                                 fill="none" stroke="currentColor"
                                 stroke-width="2" viewBox="0 0 24 24">
                            </svg>
                        </div>
                        <span data-slot="label"
                              style="font-size:11px;font-weight:700;letter-spacing:0.6px;
              text-transform:uppercase;color:var(--text-3);line-height:1.3;">
            </span>
                    </div>
                    <span data-slot="value"
                          style="font-size:34px;font-weight:700;line-height:1;color:var(--text-1);">
          </span>
                </div>
            </template>

        </div>

        <!-- FİLTRE ÇUBUĞU -->
        <div class="card mb-16 animate-up stagger-2" style="padding:12px 16px;">
            <div class="flex gap-12 flex-wrap">

                <div class="search-input" style="flex:1;min-width:200px;">
                    <svg width="14" height="14" fill="none" stroke="currentColor"
                         stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="run-search"
                           placeholder="Run ID, senaryo adı veya kullanıcı ara...">
                </div>

                <div id="status-tabs"
                     style="background:var(--surface-2);padding:3px;
          border-radius:var(--radius);display:flex;gap:3px;flex-shrink:0;">
                    <button class="ftab active" data-status="ALL">Tümü</button>
                    <button class="ftab" data-status="SUCCESS">Başarılı</button>
                    <button class="ftab" data-status="FAIL">Başarısız</button>
                    <button class="ftab" data-status="RUNNING">Çalışan</button>
                </div>

                <select id="date-filter" class="form-select" style="width:140px;flex-shrink:0;">
                    <option value="all">Tüm zamanlar</option>
                    <option value="today">Bugün</option>
                    <option value="week" selected>Son 7 gün</option>
                    <option value="month">Son 30 gün</option>
                </select>

            </div>
        </div>

        <!-- KOŞUM TABLOSU -->
        <div class="card animate-up stagger-3" style="overflow:hidden;">
            <table class="aft-table">
                <thead>
                <tr>
                    <th style="width:100px;">DURUM</th>
                    <th>SENARYO</th>
                    <th style="width:100px;">ADIMLAR</th>
                    <th style="width:70px;">SÜRE</th>
                    <th style="width:110px;">TETİKLEYEN</th>
                    <th style="width:140px;">KULLANICI</th>
                    <th style="width:150px;">ZAMAN</th>
                    <th style="width:36px;"></th>
                </tr>
                </thead>
                <tbody id="runs-tbody">
                <tr id="sk-r1">
                    <td><div class="skeleton" style="height:22px;width:72px;border-radius:99px;"></div></td>
                    <td>
                        <div class="skeleton" style="height:14px;width:55%;margin-bottom:5px;"></div>
                        <div class="skeleton" style="height:11px;width:40%;"></div>
                    </td>
                    <td><div class="skeleton" style="height:13px;width:40px;"></div></td>
                    <td><div class="skeleton" style="height:13px;width:30px;"></div></td>
                    <td><div class="skeleton" style="height:13px;width:55px;"></div></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <div class="skeleton" style="width:28px;height:28px;border-radius:50%;flex-shrink:0;"></div>
                            <div class="skeleton" style="height:13px;width:65px;"></div>
                        </div>
                    </td>
                    <td>
                        <div class="skeleton" style="height:13px;width:85px;margin-bottom:4px;"></div>
                        <div class="skeleton" style="height:11px;width:55px;"></div>
                    </td>
                    <td></td>
                </tr>
                <tr id="sk-r2">
                    <td><div class="skeleton" style="height:22px;width:72px;border-radius:99px;"></div></td>
                    <td>
                        <div class="skeleton" style="height:14px;width:45%;margin-bottom:5px;"></div>
                        <div class="skeleton" style="height:11px;width:30%;"></div>
                    </td>
                    <td><div class="skeleton" style="height:13px;width:40px;"></div></td>
                    <td><div class="skeleton" style="height:13px;width:30px;"></div></td>
                    <td><div class="skeleton" style="height:13px;width:55px;"></div></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <div class="skeleton" style="width:28px;height:28px;border-radius:50%;flex-shrink:0;"></div>
                            <div class="skeleton" style="height:13px;width:65px;"></div>
                        </div>
                    </td>
                    <td>
                        <div class="skeleton" style="height:13px;width:85px;margin-bottom:4px;"></div>
                        <div class="skeleton" style="height:11px;width:55px;"></div>
                    </td>
                    <td></td>
                </tr>
                <tr id="sk-r3">
                    <td><div class="skeleton" style="height:22px;width:72px;border-radius:99px;"></div></td>
                    <td>
                        <div class="skeleton" style="height:14px;width:60%;margin-bottom:5px;"></div>
                        <div class="skeleton" style="height:11px;width:35%;"></div>
                    </td>
                    <td><div class="skeleton" style="height:13px;width:40px;"></div></td>
                    <td><div class="skeleton" style="height:13px;width:30px;"></div></td>
                    <td><div class="skeleton" style="height:13px;width:55px;"></div></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <div class="skeleton" style="width:28px;height:28px;border-radius:50%;flex-shrink:0;"></div>
                            <div class="skeleton" style="height:13px;width:65px;"></div>
                        </div>
                    </td>
                    <td>
                        <div class="skeleton" style="height:13px;width:85px;margin-bottom:4px;"></div>
                        <div class="skeleton" style="height:11px;width:55px;"></div>
                    </td>
                    <td></td>
                </tr>
                </tbody>
            </table>

            <div id="runs-empty" style="display:none;">
                <div class="empty-state">
                    <div class="empty-state-icon">🔍</div>
                    <div class="empty-state-title">Koşum bulunamadı</div>
                    <div class="empty-state-desc">Filtre kriterlerini değiştirmeyi deneyin.</div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ══ TEMPLATES ══════════════════════════════════ -->

<template id="tpl-run-row">
    <tr data-slot="row" style="cursor:pointer;">
        <td data-slot="status-td"></td>
        <td>
            <div style="font-size:14px;font-weight:600;color:var(--text-1);"
                 data-slot="name"></div>
            <div style="font-size:11px;color:var(--text-3);margin-top:3px;
        font-family:monospace;" data-slot="meta"></div>
        </td>
        <td data-slot="steps-td"></td>
        <td style="font-family:monospace;font-size:13px;color:var(--text-2);"
            data-slot="dur"></td>
        <td data-slot="trig-td"></td>
        <td data-slot="user-td"></td>
        <td>
            <div class="time-rel" data-slot="time-rel"></div>
            <div class="time-abs" data-slot="time-abs"></div>
        </td>
        <td>
            <button class="chev-btn" data-slot="btn-detail" title="Detayı gör">
                <svg width="14" height="14" fill="none" stroke="currentColor"
                     stroke-width="2.5" viewBox="0 0 24 24">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </button>
        </td>
    </tr>
</template>

<!-- ══ DRAWER ══════════════════════════════════════ -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="detail-drawer" style="width:500px;">

    <div class="drawer-header">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
            <span id="dw-badge"></span>
            <span class="drawer-title" id="dw-title"
                  style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
        Koşum Detayı
      </span>
        </div>
        <button class="modal-close" id="drawer-close"
                style="font-size:22px;margin-left:8px;">×</button>
    </div>

    <div class="drawer-body">

        <!-- Meta bilgiler -->
        <div class="card mb-16" style="padding:0;overflow:hidden;">
            <table class="dw-meta-tbl">
                <tbody id="dw-meta"></tbody>
            </table>
        </div>

        <!-- Hata kutusu -->
        <div id="dw-error-wrap" style="display:none;margin-bottom:16px;">
            <div style="background:var(--danger-bg);border:1px solid rgba(239,68,68,0.2);
        border-radius:var(--radius);padding:12px 14px;">
                <div style="display:flex;align-items:center;gap:6px;
          font-size:12px;font-weight:700;color:var(--danger);
          text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px;">
                    <svg width="13" height="13" fill="none" stroke="currentColor"
                         stroke-width="2" viewBox="0 0 24 24">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    Hata Mesajı
                </div>
                <div id="dw-error-msg"
                     style="font-family:monospace;font-size:12px;
          color:var(--danger);line-height:1.6;"></div>
            </div>
        </div>

        <!-- Adım geçmişi -->
        <div id="dw-steps-wrap" style="display:none;margin-bottom:16px;">
            <div class="dw-lbl">
                ADIM GEÇMİŞİ
                <span id="dw-steps-count"
                      style="background:var(--surface-2);color:var(--text-2);
          border-radius:99px;padding:1px 8px;
          font-size:11px;font-weight:600;">
        </span>
            </div>
            <div id="dw-steps-list"></div>
        </div>

        <!-- Log -->
        <div style="margin-bottom:16px;">
            <div class="dw-lbl">KOŞUM LOGU</div>
            <div class="log-box" id="dw-log">—</div>
        </div>

        <!-- Screenshot -->
        <div id="dw-screenshot-wrap" style="display:none;">
            <div class="dw-lbl" style="color:var(--danger);">HATA ANI EKRANI</div>
            <div style="border-radius:var(--radius);overflow:hidden;
        border:1px solid rgba(239,68,68,0.3);">
                <img id="dw-screenshot" src="" alt="Hata ekranı"
                     style="width:100%;display:block;">
            </div>
        </div>

    </div>

    <div class="drawer-footer">
        <button class="btn btn-secondary btn-sm" id="dw-report-dl">
            <svg width="13" height="13" fill="none" stroke="currentColor"
                 stroke-width="2" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Rapor İndir
        </button>
        <button class="btn btn-primary btn-sm" id="dw-rerun">
            <svg width="13" height="13" fill="none" stroke="currentColor"
                 stroke-width="2.5" viewBox="0 0 24 24">
                <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Tekrar Çalıştır
        </button>
    </div>
</div>

<!-- Adım satırı template -->
<template id="tpl-step">
    <div class="dw-step-row" data-slot="row">
        <div class="dw-step-num"  data-slot="num"></div>
        <div class="dw-step-name" data-slot="name"></div>
        <div class="dw-step-dur"  data-slot="dur"></div>
        <div class="dw-step-icon" data-slot="icon"></div>
    </div>
</template>

<script src="/Js/app.js"></script>
<script src="/Js/sidebar.js"></script>
<script src="/Js/navbar.js"></script>
<script src="/Js/chat.js"></script>
<script src="/Js/runs.js"></script>
</body>
</html>
