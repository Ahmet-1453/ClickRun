<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | Click&Run</title>
    <link rel="stylesheet" href="/Css/login.css">
</head>
<body>

<div class="auth-layout">

    <!-- Sol Panel -->
    <div class="auth-left">
        <div class="auth-content">
            <div class="auth-logo">
                <div class="logo-icon">C&R</div>
                <div class="logo-text">Click&Run</div>
            </div>

            <h1 class="auth-headline">Test Otomasyonu<br>Platformu</h1>
            <p class="auth-tagline">
                Selenium tabanlı web test senaryolarınızı kolayca oluşturun,
                çalıştırın ve yönetin.
            </p>

            <div class="auth-features">
                <div class="feature-item">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    <span>Kodsuz senaryo tasarlama</span>
                </div>
                <div class="feature-item">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    <span>Canlı test izleme</span>
                </div>
                <div class="feature-item">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    <span>Zamanlanmış testler</span>
                </div>
                <div class="feature-item">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    <span>Detaylı raporlama</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Sağ Panel -->
    <div class="auth-right">
        <div class="auth-form">

            <div class="form-header">
                <h2>Tekrar hoş geldiniz</h2>
                <p>Hesabınıza giriş yapın</p>
            </div>

            <form id="login-form" autocomplete="on">

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label">E-posta</label>
                    <input
                            type="email"
                            class="form-input"
                            id="email"
                            placeholder="ornek@email.com"
                            autocomplete="email"
                            required>
                </div>

                <!-- Şifre -->
                <div class="form-group">
                    <label class="form-label">Şifre</label>
                    <div class="password-input">
                        <input
                                type="password"
                                class="form-input"
                                id="password"
                                placeholder="••••••••"
                                autocomplete="current-password"
                                required>
                        <button type="button" class="password-toggle" id="toggle-password">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Error Message -->
                <div id="error-message" class="error-message" style="display:none;"></div>

                <!-- Submit -->
                <button type="submit" class="btn-submit" id="btn-submit">
                    <span id="btn-text">Giriş Yap</span>
                    <span id="btn-loader" class="btn-loader" style="display:none;"></span>
                </button>

            </form>

            <!-- Alt Link -->
            <div class="form-footer">
                Henüz hesabınız yok mu?
                <a href="/Html/register.html">Kayıt olun</a>
            </div>

        </div>
    </div>

</div>

<script src="/Js/login.js"></script>
</body>
</html>
